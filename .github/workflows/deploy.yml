name: Deployment with Github Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: mezothic.github.io
        uses: actions/checkout@v4
      - name: Install, build, and upload mezothic.github.io output
        uses: withastro/action@v1
        with:
            path: .
        #     node-version: 20 
            package-manager: npm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages Production Stage
        id: deployment
        uses: actions/deploy-pages@v3
